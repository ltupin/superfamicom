<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Super Famicom — Liste des jeux</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header>
    <h1>Super Famicom — Liste des jeux</h1>
  </header>
  <main>
    <div class="controls">
      <input id="search" placeholder="Rechercher par titre, éditeur..." />
      <select id="category"><option value="">Toutes catégories</option></select>
      <button id="clear">Effacer</button>
    </div>
    <div id="count"></div>
    <div id="pager-top" class="pager"></div>
    <div class="table-wrap">
      <table id="games">
        <thead>
          <tr>
            <th>Title</th>
            <th>Japanese</th>
            <th>Publisher</th>
            <th>Serial</th>
            <th>Date</th>
            <th>Category</th>
            <th>Sub</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
    <div id="pager-bottom" class="pager"></div>
  </main>
  <footer>
    <small>Site généré localement — héberger via GitHub Pages (voir README).</small>
  </footer>
  <script src="script.js"></script>
</body>
</html>
